<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📰 每日新闻简报</title>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --card-hover: #1f2937;
      --border: #30363d;
      --text: #e6edf3;
      --text-secondary: #8b949e;
      --accent: #58a6ff;
      --accent-bg: rgba(88,166,255,0.15);
      --red: #f85149;
      --green: #3fb950;
      --orange: #d29922;
      --purple: #bc8cff;
      --pink: #f778ba;
      --sidebar-width: 280px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1a1f2e 0%, #0d1117 100%);
      border-bottom: 1px solid var(--border);
      padding: 20px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 20px; font-weight: 700; }
    .header h1 span { color: var(--accent); }
    .header-stats {
      display: flex;
      gap: 16px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .header-stats strong { color: var(--text); }

    /* Main Layout */
    .main {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      min-height: calc(100vh - 70px);
    }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-width);
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      padding: 16px;
      overflow-y: auto;
      position: sticky;
      top: 70px;
      height: calc(100vh - 70px);
    }
    .date-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      margin-bottom: 6px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
    }
    .date-item:hover {
      background: var(--card-hover);
      border-color: var(--border);
    }
    .date-item.active {
      background: var(--accent-bg);
      border-color: var(--accent);
    }
    .date-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .date-icon { font-size: 16px; }
    .date-text {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }
    .date-badge {
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(88,166,255,0.1);
      color: var(--accent);
      font-weight: 500;
    }
    .date-item.active .date-badge {
      background: var(--accent);
      color: var(--bg);
    }

    /* Content */
    .content {
      flex: 1;
      padding: 20px 24px;
      overflow-y: auto;
      height: calc(100vh - 70px);
    }
    .content-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .content-title {
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .content-count {
      font-size: 13px;
      color: var(--text-secondary);
      background: var(--card);
      padding: 4px 10px;
      border-radius: 12px;
    }

    /* Search */
    .search-bar {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 16px;
      display: flex;
      gap: 10px;
    }
    .search-bar input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    .search-bar select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      padding: 6px 10px;
      cursor: pointer;
    }

    /* News Item */
    .news-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 10px;
      transition: all 0.2s;
      overflow: hidden;
    }
    .news-item:hover {
      border-color: #484f58;
      transform: translateX(2px);
    }
    .news-item.expanded {
      border-color: var(--accent);
    }
    .news-head {
      padding: 14px 18px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .news-left { flex: 1; }
    .news-title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .news-title {
      font-size: 15px;
      font-weight: 500;
      line-height: 1.5;
    }
    .tag {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 500;
      white-space: nowrap;
    }
    .tag-stock { background: rgba(248,81,73,0.15); color: var(--red); }
    .tag-tech { background: rgba(88,166,255,0.15); color: var(--accent); }
    .tag-finance { background: rgba(210,153,34,0.15); color: var(--orange); }
    .tag-policy { background: rgba(63,185,80,0.15); color: var(--green); }
    .tag-hot { background: rgba(188,140,255,0.15); color: var(--purple); }
    .tag-storage { background: rgba(247,120,186,0.15); color: var(--pink); }
    .news-time {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 4px;
    }
    .toggle-arrow {
      color: var(--text-secondary);
      font-size: 14px;
      transition: transform 0.3s;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .news-item.expanded .toggle-arrow { transform: rotate(180deg); }
    .news-body {
      display: none;
      padding: 0 18px 16px;
      font-size: 14px;
      line-height: 1.9;
      color: var(--text-secondary);
    }
    .news-body a {
      color: var(--accent);
      text-decoration: none;
      word-break: break-all;
    }
    .news-body a:hover { text-decoration: underline; }
    .news-item.expanded .news-body { display: block; }
    .fire { color: #f85149; margin-right: 2px; }

    /* Empty */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }

    /* Footer */
    .footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: var(--text-secondary);
      border-top: 1px solid var(--border);
    }
    .footer a { color: var(--accent); text-decoration: none; }

    /* Responsive */
    @media (max-width: 900px) {
      .main { flex-direction: column; }
      .sidebar {
        width: 100%;
        position: static;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .content {
        height: auto;
        padding: 16px;
      }
      .header-stats { display: none; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-content">
      <h1>📰 <span>每日新闻简报</span></h1>
      <div class="header-stats">
        <span>共 <strong id="totalCount">-</strong> 条</span>
        <span>覆盖 <strong id="dayCount">-</strong> 天</span>
        <span>最新 <strong id="latestDate">-</strong></span>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="sidebar" id="sidebar"></div>
    <div class="content">
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍 搜索新闻..." />
        <select id="typeFilter">
          <option value="">全部分类</option>
          <option value="股市">🔴 股市</option>
          <option value="科技">🤖 科技</option>
          <option value="金融">💰 金融</option>
          <option value="时政">🌍 时政</option>
          <option value="热门">📈 热门</option>
          <option value="存储">💾 存储</option>
        </select>
      </div>
      <div id="contentArea"></div>
      <div class="footer">
        Powered by <a href="https://github.com/djl91888">djl91888</a> · ✨ 同辉自动生成
      </div>
    </div>
  </div>

  <script>
    const TAG_MAP = {
      '股市': 'tag-stock', '科技': 'tag-tech', '金融': 'tag-finance',
      '时政': 'tag-policy', '热门': 'tag-hot', '存储': 'tag-storage'
    };

    let allNews = [];
    let selectedDate = null;

    async function init() {
      try {
        const r = await fetch('data.json?' + Date.now());
        allNews = await r.json();
        allNews.sort((a, b) => b.date.localeCompare(a.date));
        renderSidebar();
        updateStats();
        // 默认选中最新日期
        if (allNews.length > 0) {
          selectedDate = allNews[0].date.slice(0, 10);
          renderContent();
        }
      } catch (e) {
        document.getElementById('contentArea').innerHTML =
          '<div class="empty"><div class="empty-icon">⚠️</div><div>数据加载失败</div></div>';
      }
    }

    function updateStats() {
      const dates = [...new Set(allNews.map(n => n.date.slice(0, 10)))];
      document.getElementById('totalCount').textContent = allNews.length;
      document.getElementById('dayCount').textContent = dates.length;
      document.getElementById('latestDate').textContent = dates[0] || '-';
    }

    function renderSidebar() {
      const groups = {};
      allNews.forEach(n => {
        const day = n.date.slice(0, 10);
        if (!groups[day]) groups[day] = [];
        groups[day].push(n);
      });

      const sidebar = document.getElementById('sidebar');
      sidebar.innerHTML = Object.entries(groups).map(([day, items]) => {
        const active = day === selectedDate ? 'active' : '';
        return `
          <div class="date-item ${active}" onclick="selectDate('${day}')">
            <div class="date-left">
              <span class="date-icon">📅</span>
              <span class="date-text">${day}</span>
            </div>
            <span class="date-badge">${items.length}条</span>
          </div>
        `;
      }).join('');
    }

    function selectDate(date) {
      selectedDate = date;
      renderSidebar();
      renderContent();
    }

    function getFiltered() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const t = document.getElementById('typeFilter').value;
      let list = allNews.filter(n => n.date.startsWith(selectedDate));
      if (q) {
        list = list.filter(n => 
          n.title.toLowerCase().includes(q) || 
          (n.content||'').toLowerCase().includes(q)
        );
      }
      if (t) {
        list = list.filter(n => n.category === t);
      }
      return list;
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function linkify(text) {
      return esc(text).replace(
        /(https?:\/\/[^\s<]+)/g,
        '<a href="$1" target="_blank" rel="noopener">$1</a>'
      );
    }

    function renderContent() {
      const list = getFiltered();
      const el = document.getElementById('contentArea');

      if (!selectedDate) {
        el.innerHTML = '<div class="empty"><div class="empty-icon">👈</div><div>请选择左侧日期</div></div>';
        return;
      }

      const header = `
        <div class="content-header">
          <div class="content-title">
            📅 ${selectedDate}
          </div>
          <span class="content-count">${list.length} 条新闻</span>
        </div>
      `;

      if (!list.length) {
        el.innerHTML = header + '<div class="empty"><div class="empty-icon">📭</div><div>暂无匹配结果</div></div>';
        return;
      }

      el.innerHTML = header + list.map((n, i) => {
        const tagClass = TAG_MAP[n.category] || 'tag-hot';
        const fire = n.hot ? '<span class="fire">🔥</span>' : '';
        const id = selectedDate + '-' + i;
        return `
          <div class="news-item" id="${id}">
            <div class="news-head" onclick="toggle('${id}')">
              <div class="news-left">
                <div class="news-title-row">
                  ${fire}<span class="news-title">${esc(n.title)}</span>
                  <span class="tag ${tagClass}">${n.category || '其他'}</span>
                </div>
                <div class="news-time">${n.source ? n.source + ' · ' : ''}${n.date.slice(11) || ''}</div>
              </div>
              <span class="toggle-arrow">▼</span>
            </div>
            <div class="news-body">${linkify(n.content || '暂无详情')}</div>
          </div>
        `;
      }).join('');
    }

    function toggle(id) {
      document.getElementById(id).classList.toggle('expanded');
    }

    document.getElementById('searchInput').addEventListener('input', renderContent);
    document.getElementById('typeFilter').addEventListener('change', renderContent);

    init();
  </script>
</body>
</html>
